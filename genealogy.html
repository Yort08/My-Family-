<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genealogical Data — The Dancel Family Archive</title>
  <meta name="description" content="View a comprehensive list of birthdates, birthplaces, and relationships for everyone in the Dancel family tree.">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Custom page-specific styling for the genealogy data sheet */
    .genealogy-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }
    .data-table-wrapper {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: 16px;
      box-shadow: var(--shadow-md);
      overflow-x: auto;
      margin-top: 1.5rem;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-family: var(--font-sans);
    }
    .data-table th, .data-table td {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--color-border);
      color: var(--color-text-main);
    }
    .data-table th {
      background: rgba(20, 61, 42, 0.05);
      font-family: var(--font-serif-header);
      font-weight: 700;
      color: var(--color-accent-emerald);
      user-select: none;
    }
    :root[data-theme="dark"] .data-table th {
      background: rgba(76, 184, 127, 0.1);
      color: var(--color-accent-emerald);
    }
    .data-table tr {
      cursor: pointer;
      transition: var(--transition-fast);
    }
    .data-table tr:hover {
      background: var(--color-bg-card-hover);
    }
    .member-info-cell {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .member-avatar-mini {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--color-border-gold);
    }
    .member-avatar-fallback {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
      font-size: 0.9rem;
    }
    .search-filter-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .genealogy-search {
      flex: 1;
      min-width: 250px;
      padding: 0.8rem 1.2rem;
      border: 1px solid var(--color-border);
      border-radius: 30px;
      font-family: var(--font-sans);
      background: var(--color-bg-card);
      color: var(--color-text-main);
      outline: none;
      transition: var(--transition-fast);
    }
    .genealogy-search:focus {
      border-color: var(--color-border-gold);
    }
    .genealogy-filter {
      padding: 0.8rem 1.2rem;
      border: 1px solid var(--color-border);
      border-radius: 30px;
      font-family: var(--font-sans);
      background: var(--color-bg-card);
      color: var(--color-text-main);
      outline: none;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      .data-table th:nth-child(4), .data-table td:nth-child(4),
      .data-table th:nth-child(5), .data-table td:nth-child(5) {
        display: none; /* Hide birthplace/occupation on mobile to keep readable */
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="home.html" class="back-to-home-btn">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
      Back to Home
    </a>
    <button class="theme-toggle-btn" id="theme-toggle" title="Toggle Dark Mode">
      <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24">
        <path d="M21.64 15.95c-.18-.87-.46-1.69-.82-2.47.54-.5 1.25-1.3 1.25-2.12 0-.88-.75-1.6-1.63-1.6-.07 0-.15 0-.22.01C19.27 7.2 17.66 5.02 15.5 5c-1.4 0-2.74.5-3.8 1.3-.75-.23-1.54-.35-2.35-.35-5.31 0-9.65 4.26-9.65 9.5s4.34 9.5 9.65 9.5c.3 0 .59-.01.88-.04 1.06.68 2.36 1.08 3.7 1.08 1.45 0 2.8-.48 3.77-1.3l.5.5c.75.75 2.07.75 2.82 0 .75-.75.75-2.07 0-2.82l-.5-.5.02-.82c.14-1.14.2-2.3.2-3.46.53-1.69.82-3.46.82-5.3 0-2.84-1.22-5.39-3.15-7.15z"/>
      </svg>
    </button>
    <div class="header-center">
      <div class="brand-badge">Comprehensive Record</div>
      <h1 class="main-title">Genealogical Data Sheet</h1>
      <p class="subtitle">Complete chronological database of all Dancel family members.</p>
    </div>
  </header>

  <main class="genealogy-container" id="genealogy-layout">
    <div class="search-filter-bar">
      <input type="text" id="genealogy-search-input" class="genealogy-search" placeholder="Filter by name, relation, birthplace, occupation..." autocomplete="off">
      <select id="genealogy-generation-filter" class="genealogy-filter">
        <option value="all">All Generations</option>
        <option value="1">1st Gen (Parents)</option>
        <option value="2">2nd Gen (Siblings)</option>
        <option value="3">3rd Gen (Grandchildren & Pets)</option>
      </select>
    </div>

    <div class="data-table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Relationship</th>
            <th>Age / Birthdate</th>
            <th>Birthplace</th>
            <th>Occupation</th>
          </tr>
        </thead>
        <tbody id="genealogy-table-body">
          <!-- Dynamic contents -->
        </tbody>
      </table>
    </div>
  </main>

  <footer>
    <p class="footer-heart">
      Made with 
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
        <path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0112 5.052 5.5 5.5 0 0116.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" />
      </svg>
      by Troy Lits Dancel
    </p>
    <p>&copy; 2026 The Dancel Family Archive. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
