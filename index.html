      <p class="subtitle">"Family: where life begins and love never ends."</p>

    <!-- Controls section: Search and generation filters -->
    <div class="controls-container">
      <div class="search-wrapper">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">

        <div id="suggestions-popup" class="suggestions-popup"></div>
      </div>
      <select id="filter-select" class="filter-select">
        <option value="all">All Generations</option>
        <option value="1">1st Gen (Parents)</option>
        <option value="2">2nd Gen (Siblings)</option>
      </select>
    </div>
